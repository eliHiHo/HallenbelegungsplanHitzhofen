############################################
# DATABASE
############################################
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:hallen}
quarkus.datasource.password=${DB_PASSWORD:hallen}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/hallen}

quarkus.hibernate-orm.database.generation=update
%prod.quarkus.hibernate-orm.database.generation=validate

quarkus.datasource.devservices.enabled=false


############################################
# SWAGGER / DEV UI
############################################
quarkus.swagger-ui.always-include=true

############################################
# BOOTSTRAP (Initial Admin)
############################################
app.bootstrap.enabled=true
app.bootstrap.initial-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.initial-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.initial-admin.first-name=System
app.bootstrap.initial-admin.last-name=Admin

%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.app.seed.enabled=true
############################################
# MAIL (APP LEVEL)
############################################
app.mail.enabled=${MAIL_ENABLED:false}
app.mail.from=${MAIL_FROM:belegungsplan@hallen.hitzhofen.de}
app.mail.reply-to=${MAIL_REPLY_TO:belegungsplan@hallen.hitzhofen.de}

# wichtig f�r Passwort-Reset Links
app.mail.base-url=${MAIL_BASE_URL:http://localhost:5173}


# DEV: false wenn Mailpit genutzt wird, true wenn du komplett mocken willst
quarkus.mailer.mock=${MAIL_MOCK:false}


############################################
# LOGGING (optional aber hilfreich)
############################################
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.format-sql=true
%prod.quarkus.hibernate-orm.log.sql=false
%prod.quarkus.hibernate-orm.log.format-sql=false


# CORS ? erlaubt Frontend-Zugriff aus dem Browser
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:3000
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Cookie
quarkus.http.cors.exposed-headers=Location,Set-Cookie
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.same-site-cookie.HB_SESSION=lax

# Lokale Entwicklung: secure=false erlaubt (kein HTTPS lokal)
%dev.quarkus.http.same-site-cookie.HB_SESSION=lax

app.session.cookie.secure=true
%dev.app.session.cookie.secure=false

# Mail-Konfiguration (Produktionswerte vom Hosting-Anbieter anpassen)
quarkus.mailer.from=${MAIL_FROM:noreply@hitzhofen.de}
quarkus.mailer.host=${MAIL_HOST:localhost}
quarkus.mailer.port=${MAIL_PORT:1025}
quarkus.mailer.start-tls=${MAIL_STARTTLS:DISABLED}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}

# F�r lokale Entwicklung: Fake-Mailer (Mails erscheinen nur im Log)
%dev.quarkus.mailer.mock=true

# Basis-URL f�r Reset-Links (muss zur Frontend-URL passen)
app.base-url=https://hallenbelegungsplan.hitzhofen.de
%dev.app.base-url=http://localhost:5173